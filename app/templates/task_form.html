{% extends "base.html" %}
<!-- Import von Bootstrap-WTF für einfache Formular-Darstellung -->
{% import 'bootstrap_wtf.html' as wtf %}

{% block content %}
<!-- Dynamischer Titel (kommt vom Backend) -->
<h1>{{ title }}</h1>

<div class="col-md-6">
    <!-- Formular wird automatisch mit Bootstrap gestylt gerendert -->
    {{ wtf.quick_form(form) }}
</div>

{% endblock %}
